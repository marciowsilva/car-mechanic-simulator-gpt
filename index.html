<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Car Mechanic Simulator</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #1e1e1e;
        color: #fff;
      }

      .header {
        display: flex;
        justify-content: space-between;
        padding: 15px;
        background: #111;
        border-bottom: 1px solid #333;
      }

      .menu {
        display: flex;
        gap: 10px;
        padding: 10px;
        background: #222;
      }

      .menu button {
        padding: 10px;
        background: #333;
        border: none;
        color: white;
        cursor: pointer;
      }

      .menu button:hover {
        background: #555;
      }

      .content {
        padding: 20px;
        min-height: 400px;
      }

      .tools {
        padding: 10px;
        background: #111;
        border-top: 1px solid #333;
      }

      .card {
        background: #2a2a2a;
        padding: 10px;
        margin: 5px 0;
        border-radius: 5px;
      }

      .actions {
        margin: 10px 0;
      }

      button {
        margin-right: 5px;
      }
    </style>
  </head>

  <body>
    <!-- 🔥 A UI inteira será renderizada aqui -->
    <div id="app"></div>

    <!-- IMPORTANTE: script no final -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
