<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Car Mechanic Simulator</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Car Mechanic Simulator</h1>
      <div id="money">💰 Dinheiro: $<span id="money-value">0</span></div>
    </header>

    <main>
      <section id="garage">
        <h2>🚗 Garagem</h2>
        <div id="car-view"></div>
      </section>

      <section id="job">
        <h2>👨‍🔧 Cliente</h2>
        <div id="job-description"></div>
      </section>

      <section id="inventory">
        <h2>📦 Inventário</h2>
        <div id="inventory-list"></div>
      </section>

      <section id="shop">
        <h2>🛒 Loja</h2>
        <div id="shop-list"></div>
      </section>

      <section id="tools">
        <h2>🧰 Ferramentas</h2>

        <button onclick="window.selectTool('wrench')">🔧 Chave inglesa</button>
        <button onclick="window.selectTool('wheel')">🛞 Chave de roda</button>

        <div id="current-tool"></div>
      </section>
    </main>

    <div id="notifications"></div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
