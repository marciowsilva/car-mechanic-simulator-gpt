<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Car Mechanic Simulator - GPT</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #1e1e1e;
        color: #fff;
      }

      .header {
        display: flex;
        justify-content: space-between;
        padding: 15px;
        background: #111;
        border-bottom: 1px solid #333;
      }

      .menu {
        display: flex;
        gap: 10px;
        padding: 10px;
        background: #222;
      }

      .menu button {
        padding: 10px;
        background: #333;
        border: none;
        color: white;
        cursor: pointer;
      }

      .menu button:hover {
        background: #555;
      }

      .content {
        padding: 20px;
        min-height: 400px;
      }

      .tools {
        padding: 10px;
        background: #111;
        border-top: 1px solid #333;
      }

      .card {
        background: #2a2a2a;
        padding: 10px;
        margin: 5px 0;
        border-radius: 5px;
      }

      .actions {
        margin: 10px 0;
      }

      button {
        margin-right: 5px;
      }

      .car {
        position: relative;
        width: 300px;
        height: 200px;
        margin: 20px auto;
        background: #333;
        border-radius: 10px;
      }

      .car-body {
        text-align: center;
        font-size: 40px;
        padding-top: 60px;
      }

      .part {
        position: absolute;
        cursor: pointer;
        font-size: 24px;
      }

      .wheel {
        bottom: 10px;
        left: 20px;
      }

      .brake {
        bottom: 10px;
        right: 20px;
      }

      .engine {
        top: 10px;
        left: 120px;
      }

      .battery {
        top: 50px;
        right: 20px;
      }

      .part:hover {
        transform: scale(1.2);
      }

      .part {
        position: absolute;
        cursor: pointer;
        font-size: 24px;
        transition: 0.2s;
      }

      /* 🟢 pode interagir */
      .part.ok {
        color: #00ff88;
      }

      /* 🔴 bloqueado */
      .part.blocked {
        color: #ff4444;
      }

      /* 🟡 ferramenta errada */
      .part.wrong {
        color: #ffcc00;
      }

      /* hover */
      .part:hover {
        transform: scale(1.2);
      }
    </style>
  </head>

  <body>
    <!-- 🔥 A UI inteira será renderizada aqui -->
    <div id="app"></div>

    <!-- IMPORTANTE: script no final -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
